name: Build BaseScanner Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Pre-download Forge userdev
        run: |
          CACHE="$HOME/.gradle/caches/minecraft/net/minecraftforge/forge/1.8.9-11.15.1.2318/stable/22"
          mkdir -p "$CACHE"
          curl -L "https://maven.minecraftforge.net/net/minecraftforge/forge/1.8.9-11.15.1.2318/forge-1.8.9-11.15.1.2318-userdev.jar" \
               -o "$CACHE/forge-userdev.jar" || \
          curl -L "http://files.minecraftforge.net/maven/net/minecraftforge/forge/1.8.9-11.15.1.2318/forge-1.8.9-11.15.1.2318-userdev.jar" \
               -o "$CACHE/forge-userdev.jar"
          echo "Userdev jar: $(ls -lh $CACHE/forge-userdev.jar)"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Forge workspace
        run: ./gradlew setupDecompWorkspace --no-daemon
        timeout-minutes: 30

      - name: Build JAR
        run: ./gradlew build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: BaseScanner-1.0
          path: build/libs/BaseScanner-1.0.jar
          retention-days: 30
